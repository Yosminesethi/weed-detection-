<!DOCTYPE html>
<html>
<head>
    <title>Weed Detection AI</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h1>🌱 Detect Weeds Instantly with AI</h1>
<p>Upload image OR use camera</p>

<!-- 🔥 UPLOAD -->
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <br><br>
    <button type="submit">Analyze Image</button>
</form>

<br>

<!-- 🔥 OUTPUT -->
{% if prediction %}
    <h2>{{ prediction }}</h2>
    <p>{{ action }}</p>
{% endif %}

{% if image_path %}
    <img src="{{ image_path }}" width="300">
{% endif %}

<hr>

<h2>📷 Camera Detection</h2>

<video id="video" autoplay playsinline width="300"></video>
<br><br>

<button onclick="startCamera()">Open Camera</button>
<button onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="result"></div>

<script>
let video = document.getElementById("video");

// 🔥 BACK CAMERA FIX
function startCamera() {
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
    })
    .then(stream => {
        video.srcObject = stream;
    })
    .catch(err => {
        alert("Camera error: " + err);
    });
}


// 🔥 CAPTURE + SEND
function capture() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const image = canvas.toDataURL("image/jpeg");

    fetch("/capture", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ image: image })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML = `
            <h3>${data.prediction}</h3>
            <p>${data.action}</p>
            <img src="${data.image_path}" width="300">
        `;
    })
    .catch(err => {
        alert("ERROR: " + err);
    });
}
</script>

</body>
</html>
